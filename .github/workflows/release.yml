name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# Prevent two releases racing if commits land quickly.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only publish when CI passed — never on a failing build.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # Check out the exact commit CI ran against, not whatever HEAD is now.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          # Override in repo secrets: NPM_REGISTRY_URL (defaults to GitHub Packages)
          registry-url: ${{ secrets.NPM_REGISTRY_URL || 'https://npm.pkg.github.com' }}
      - run: npm ci
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fall back to GITHUB_TOKEN so GitHub Packages works without a separate NPM_TOKEN secret.
          # Set NPM_TOKEN in repo secrets to publish to a private registry instead.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
